<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苏州一日游策划</title>
    <style>
        :root {
            --primary: #4A7C59;
            --primary-light: #6B9B7A;
            --secondary: #F5E6D3;
            --accent: #D4A574;
            --text-dark: #2C3E2D;
            --text-light: #5A6B5C;
            --white: #FFFFFF;
            --student-bubble: #E8F5E9;
            --elder-bubble: #FFF8E1;
            --shadow: rgba(74, 124, 89, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #F5E6D3 0%, #E8DCC8 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: var(--white);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 20px var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .header-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 0.95rem;
            opacity: 0.95;
        }

        .header-info span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Progress Bar */
        .progress-container {
            background: rgba(255,255,255,0.2);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 12px;
        }

        .progress-bar {
            flex: 1;
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .progress-text {
            font-size: 0.85rem;
            white-space: nowrap;
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        /* Message Bubbles */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.student {
            align-self: flex-start;
        }

        .message.elder {
            align-self: flex-end;
        }

        .message-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            margin-bottom: 6px;
        }

        .message.student .message-avatar {
            background: var(--primary);
            color: var(--white);
        }

        .message.elder .message-avatar {
            background: var(--accent);
            color: var(--white);
        }

        .message-bubble {
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.7;
            font-size: 1.05rem;
            position: relative;
        }

        .message.student .message-bubble {
            background: var(--student-bubble);
            color: var(--text-dark);
            border-bottom-left-radius: 6px;
            box-shadow: 0 3px 12px var(--shadow);
        }

        .message.elder .message-bubble {
            background: var(--elder-bubble);
            color: var(--text-dark);
            border-bottom-right-radius: 6px;
            box-shadow: 0 3px 12px var(--shadow);
        }

        .message-time {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 6px;
            padding: 0 8px;
        }

        .message.elder .message-time {
            text-align: right;
        }

        /* Quick Reply Buttons */
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .quick-btn {
            padding: 10px 18px;
            border: 2px solid var(--primary);
            background: var(--white);
            color: var(--primary);
            border-radius: 25px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .quick-btn:hover {
            background: var(--primary);
            color: var(--white);
            transform: translateY(-2px);
        }

        .quick-btn.selected {
            background: var(--primary);
            color: var(--white);
        }

        /* Input Area */
        .input-area {
            background: var(--white);
            padding: 20px;
            border-top: 1px solid rgba(74, 124, 89, 0.1);
            box-shadow: 0 -4px 20px var(--shadow);
        }

        .input-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .input-wrapper input,
        .input-wrapper textarea {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #E0E0E0;
            border-radius: 25px;
            font-size: 1.05rem;
            outline: none;
            transition: border-color 0.3s ease;
            resize: none;
        }

        .input-wrapper input:focus,
        .input-wrapper textarea:focus {
            border-color: var(--primary);
        }

        .input-wrapper textarea {
            min-height: 50px;
            max-height: 120px;
            border-radius: 18px;
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border: none;
            background: var(--primary);
            color: var(--white);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .send-btn:hover {
            background: var(--primary-light);
            transform: scale(1.05);
        }

        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--white);
            border-radius: 20px;
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            background: var(--primary);
            color: var(--white);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 1.3rem;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--white);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }

        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-btn.primary {
            background: var(--primary);
            color: var(--white);
        }

        .modal-btn.secondary {
            background: #f0f0f0;
            color: var(--text-dark);
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow);
        }

        /* Document Styles */
        .doc-section {
            margin-bottom: 24px;
        }

        .doc-section h3 {
            color: var(--primary);
            font-size: 1.1rem;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--secondary);
        }

        .doc-table {
            width: 100%;
            border-collapse: collapse;
        }

        .doc-table th,
        .doc-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .doc-table th {
            background: var(--secondary);
            color: var(--text-dark);
            font-weight: 600;
        }

        .doc-plan {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .doc-plan-item {
            background: var(--secondary);
            padding: 14px;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
        }

        .doc-plan-item .label {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 4px;
        }

        .doc-plan-item .value {
            font-size: 1.05rem;
            color: var(--text-dark);
            font-weight: 500;
        }

        .doc-chat {
            max-height: 300px;
            overflow-y: auto;
        }

        .doc-chat-item {
            padding: 10px 12px;
            margin-bottom: 8px;
            border-radius: 10px;
            font-size: 0.95rem;
        }

        .doc-chat-item.student {
            background: var(--student-bubble);
            border-left: 3px solid var(--primary);
        }

        .doc-chat-item.elder {
            background: var(--elder-bubble);
            border-left: 3px solid var(--accent);
        }

        .doc-chat-meta {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 4px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text-dark);
            color: var(--white);
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 1rem;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1001;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* New Chat Button */
        .new-chat-btn {
            position: fixed;
            top: 100px;
            right: 20px;
            background: var(--white);
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            z-index: 50;
        }

        .new-chat-btn:hover {
            background: var(--primary);
            color: var(--white);
        }

        /* Copy Success */
        .copy-success {
            background: var(--primary);
        }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.4rem;
            }

            .header-info {
                flex-direction: column;
                gap: 8px;
            }

            .message {
                max-width: 92%;
            }

            .doc-plan {
                grid-template-columns: 1fr;
            }

            .new-chat-btn {
                top: auto;
                bottom: 90px;
                right: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <h1>🌿 苏州一日游策划</h1>
        <div class="header-info">
            <span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                <span id="currentTime"></span>
            </span>
            <span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                <span id="currentDate"></span>
            </span>
        </div>
        <div class="progress-container">
            <span class="progress-text" id="progressText">准备开始</span>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
    </header>

    <!-- New Chat Button -->
    <button class="new-chat-btn" onclick="startNewChat()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 6px;">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        新建对话
    </button>

    <!-- Chat Container -->
    <main class="chat-container" id="chatContainer">
        <div class="empty-state" id="emptyState">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            <p>点击下方按钮开始收集苏州游玩建议</p>
        </div>
    </main>

    <!-- Input Area -->
    <div class="input-area">
        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="请输入您的回答..." rows="1"></textarea>
            </div>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <!-- Document Modal -->
    <div class="modal-overlay" id="docModal">
        <div class="modal">
            <div class="modal-header">
                <h2>📋 完整对话记录文档</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="docContent"></div>
            <div class="modal-footer">
                <button class="modal-btn secondary" onclick="closeModal()">关闭</button>
                <button class="modal-btn primary" onclick="downloadDoc()">下载文档</button>
                <button class="modal-btn primary" onclick="copyDoc()">复制内容</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ==================== State Management ====================
        const STATES = {
            START: 'START',
            GREETING: 'GREETING',
            ASK_NAME: 'ASK_NAME',
            ASK_GENDER: 'ASK_GENDER',
            ASK_AGE: 'ASK_AGE',
            ASK_SUZHOU_YEARS: 'ASK_SUZHOU_YEARS',
            CONFIRM_BASIC_INFO: 'CONFIRM_BASIC_INFO',
            ASK_SPOT1: 'ASK_SPOT1',
            CONFIRM_SPOT1: 'CONFIRM_SPOT1',
            ASK_LUNCH: 'ASK_LUNCH',
            CONFIRM_LUNCH: 'CONFIRM_LUNCH',
            ASK_SPOT2: 'ASK_SPOT2',
            CONFIRM_SPOT2: 'CONFIRM_SPOT2',
            ASK_DINNER: 'ASK_DINNER',
            CONFIRM_DINNER: 'CONFIRM_DINNER',
            FINAL_CONFIRM: 'FINAL_CONFIRM',
            COMPLETE: 'COMPLETE'
        };

        const PROGRESS_MAP = {
            [STATES.START]: 0,
            [STATES.GREETING]: 5,
            [STATES.ASK_NAME]: 12,
            [STATES.ASK_GENDER]: 18,
            [STATES.ASK_AGE]: 25,
            [STATES.ASK_SUZHOU_YEARS]: 32,
            [STATES.CONFIRM_BASIC_INFO]: 38,
            [STATES.ASK_SPOT1]: 45,
            [STATES.CONFIRM_SPOT1]: 52,
            [STATES.ASK_LUNCH]: 58,
            [STATES.CONFIRM_LUNCH]: 65,
            [STATES.ASK_SPOT2]: 72,
            [STATES.CONFIRM_SPOT2]: 78,
            [STATES.ASK_DINNER]: 84,
            [STATES.CONFIRM_DINNER]: 90,
            [STATES.FINAL_CONFIRM]: 95,
            [STATES.COMPLETE]: 100
        };

        const PROGRESS_LABELS = {
            [STATES.START]: '准备开始',
            [STATES.GREETING]: '问候中',
            [STATES.ASK_NAME]: '收集信息',
            [STATES.ASK_GENDER]: '收集信息',
            [STATES.ASK_AGE]: '收集信息',
            [STATES.ASK_SUZHOU_YEARS]: '收集信息',
            [STATES.CONFIRM_BASIC_INFO]: '确认信息',
            [STATES.ASK_SPOT1]: '规划行程',
            [STATES.CONFIRM_SPOT1]: '确认行程',
            [STATES.ASK_LUNCH]: '规划午餐',
            [STATES.CONFIRM_LUNCH]: '确认午餐',
            [STATES.ASK_SPOT2]: '规划行程',
            [STATES.CONFIRM_SPOT2]: '确认行程',
            [STATES.ASK_DINNER]: '规划晚餐',
            [STATES.CONFIRM_DINNER]: '确认晚餐',
            [STATES.FINAL_CONFIRM]: '最终确认',
            [STATES.COMPLETE]: '完成'
        };

        // Current state and data
        let currentState = STATES.START;
        let pendingConfirmState = null; // 用于追踪正在补充内容的状态
        let pendingTimeouts = []; // 用于追踪和取消未完成的 setTimeout
        let isProcessing = false; // 防止重复处理消息
        let chatData = {
            basicInfo: {
                name: '',
                gender: '',
                age: null,
                suzhouYears: null
            },
            plan: {
                spot1: '',
                lunch: '',
                spot2: '',
                dinner: ''
            },
            chatHistory: [],
            createdAt: new Date().toISOString()
        };

        // ==================== Utility Functions ====================
        function getTimestamp() {
            const now = new Date();
            return now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('currentDate').textContent = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function updateProgress() {
            const progress = PROGRESS_MAP[currentState] || 0;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = PROGRESS_LABELS[currentState] || '进行中';
        }

        function showToast(message, duration = 2000) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), duration);
        }

        function scrollToBottom() {
            const container = document.getElementById('chatContainer');
            container.scrollTop = container.scrollHeight;
        }

        // ==================== Location Extraction ====================
        // 从用户的自然语言中提取核心地点信息
        function extractLocation(userInput) {
            let text = userInput.trim();

            // 第一步：处理问号 - 问号前面的内容通常是地点
            const questionMarkIndex = text.indexOf('？') !== -1 ? text.indexOf('？') : text.indexOf('?');
            if (questionMarkIndex !== -1) {
                text = text.substring(0, questionMarkIndex).trim();
            }

            // 如果只剩下很短的内容，直接返回
            if (text.length <= 2) {
                return text || userInput.trim();
            }

            // 第二步：移除常见的描述性前缀
            const prefixes = [
                '推荐去', '推荐', '去', '想吃', '去吃', '可以找一家', '可以',
                '找一家', '想找', '找一个', '有一家', '有一家叫', '有一家叫做',
                '叫', '叫做', '叫作', '名字是', '名字叫', '名字叫做'
            ];

            for (const prefix of prefixes) {
                if (text.startsWith(prefix)) {
                    text = text.substring(prefix.length).trim();
                }
            }

            // 第三步：移除常见的描述性后缀和语气词
            const suffixes = [
                '怎么样', '好不好', '怎么样呢', '呢', '吧', '吗', '哦', '呀', '哈',
                '我很喜欢', '我很推荐', '可以去看看', '值得一去', '还不错', '挺好的',
                '挺不错的', '很好的', '不错的', '很棒', '很值得去', '挺好的地方',
                '应该不错', '大概就是这里', '大概就是', '就是这个', '就是这里',
                '我不是很清楚', '我不太清楚', '不太确定', '不太确定呢', '不太清楚哦',
                '应该是这里', '应该就是', '大概', '好像', '吃点', '吃', '喝点', '喝'
            ];

            for (const suffix of suffixes) {
                if (text.endsWith(suffix)) {
                    text = text.substring(0, text.length - suffix.length).trim();
                }
                // 也检查中间位置的suffix（前面有标点或空格）
                const pattern = new RegExp('[，,。.？?\\s]+' + suffix + '$');
                text = text.replace(pattern, '');
            }

            // 第四步：识别具体地点名称（楼、园、林、馆等结尾）
            const locationPatterns = [
                /([^\s，。、！？、；（）()\[\]{}""'']+(?:楼|园|林|山|湖|河|街|巷|店|馆|堂|轩|居|院|宫|观|寺|庙|阁|亭|城|镇|区|路))/
            ];

            for (const pattern of locationPatterns) {
                const match = text.match(pattern);
                if (match) {
                    const location = match[1];
                    // 地点名称长度合理（2-12个字符）
                    if (location.length >= 2 && location.length <= 12) {
                        return location;
                    }
                }
            }

            // 第五步：如果文本太长，尝试取最后一个有意义的词组
            if (text.length > 8) {
                // 取最后一个词组（逗号、顿号，空格分隔）
                const words = text.split(/[，。、！？\\s]/);
                for (let i = words.length - 1; i >= 0; i--) {
                    const word = words[i].trim();
                    if (word.length >= 2 && word.length <= 10) {
                        // 避免返回语气词或无意义的词
                        const ignoreWords = ['好的', '是的', '嗯', '啊', '哦', '呢', '吧'];
                        if (!ignoreWords.includes(word)) {
                            return word;
                        }
                    }
                }
            }

            return text || userInput.trim();
        }

        // 从用户的自然语言中识别意图并提取关键信息
        function analyzeIntent(userInput, type) {
            const text = userInput.trim();

            if (type === 'location') {
                return extractLocation(text);
            }

            return text;
        }

        function addMessage(speaker, content, isHtml = false) {
            const container = document.getElementById('chatContainer');
            const emptyState = document.getElementById('emptyState');
            if (emptyState) emptyState.style.display = 'none';

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${speaker}`;

            const avatar = speaker === 'student' ? '🎓' : '👤';
            const displayContent = isHtml ? content : escapeHtml(content);

            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-bubble">${displayContent}</div>
                <div class="message-time">${getTimestamp()}</div>
            `;

            container.appendChild(messageDiv);
            scrollToBottom();

            // Save to history
            chatData.chatHistory.push({
                timestamp: getTimestamp(),
                speaker: speaker,
                content: content.replace(/<[^>]*>/g, '') // Strip HTML for storage
            });
        }

        function addQuickReplies(buttons) {
            const container = document.getElementById('chatContainer');
            const lastMessage = container.lastElementChild;
            if (!lastMessage || !lastMessage.classList.contains('student')) return;

            const quickRepliesDiv = document.createElement('div');
            quickRepliesDiv.className = 'quick-replies';

            buttons.forEach(btn => {
                const button = document.createElement('button');
                button.className = 'quick-btn';
                button.textContent = btn.text;
                button.onclick = () => {
                    // Mark as selected
                    document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('selected'));

                    // Add elder's selection to chat
                    addMessage('elder', btn.text);

                    if (btn.action) btn.action();

                quickRepliesDiv.appendChild(button);

        // ==================== Message Handler ====================
        function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();

            if (!message) return;

            // 防止重复处理
            if (isProcessing) {
                return;
            }

            addMessage('elder', message);
            input.value = '';

            // Remove any quick reply buttons since user typed
            document.querySelectorAll('.quick-replies').forEach(el => el.remove());

            // 标记为正在处理
            isProcessing = true;

            // Process based on current state
            safeSetTimeout(() => {
                processState(message);
                isProcessing = false;
            }, 500);
        }

        // 安全地设置 setTimeout，自动追踪和清理
        function safeSetTimeout(callback, delay) {
            const timeoutId = setTimeout(() => {
                // 移除已完成的 timeout
                pendingTimeouts = pendingTimeouts.filter(id => id !== timeoutId);
                callback();
            }, delay);
            pendingTimeouts.push(timeoutId);
            return timeoutId;
        }

        // 清除所有待处理的 timeout
        function clearAllPendingTimeouts() {
            pendingTimeouts.forEach(id => clearTimeout(id));
            pendingTimeouts = [];
        }

        function processState(message) {
            // 检查是否处于补充内容模式
            if (pendingConfirmState) {
                handleSupplement(message);
                return;
            }

            switch (currentState) {
                case STATES.ASK_NAME:
                    handleName(message);
                    break;
                case STATES.ASK_AGE:
                    handleAge(message);
                    break;
                case STATES.ASK_SUZHOU_YEARS:
                    handleSuzhouYears(message);
                    break;
                case STATES.ASK_SPOT1:
                    handleSpot1(message);
                    break;
                case STATES.ASK_LUNCH:
                    handleLunch(message);
                    break;
                case STATES.ASK_SPOT2:
                    handleSpot2(message);
                    break;
                case STATES.ASK_DINNER:
                    handleDinner(message);
                    break;
                case STATES.FINAL_CONFIRM:
                    handleFinalModification(message);
                    break;
                case STATES.CONFIRM_BASIC_INFO:
                    // 用户可能在修改基础信息，需要解析具体内容
                    handleBasicInfoModification(message);
                    break;
                default:
                    studentSay('抱歉，我好像跟不上您的节奏了～让我们重新开始吧！');
            }
        }

        // 处理最终确认阶段的修改
        function handleFinalModification(message) {
            const text = message.trim().toLowerCase();

            // 识别要修改的内容
            let targetField = null;
            let newValue = null;

            // 检测关键词来确定要修改哪个部分
            if (text.includes('午餐') || text.includes('中午') || text.includes('午饭')) {
                targetField = 'lunch';
                // 提取新值
                const extracted = extractLocation(message);
                newValue = extracted || extractNewValue(message, '午餐');
            } else if (text.includes('早上') || text.includes('上午') || text.includes('第一站') || text.includes('早上') && text.includes('景点')) {
                targetField = 'spot1';
                newValue = extractLocation(message) || extractNewValue(message, '早上');
            } else if (text.includes('下午') || text.includes('第二站') || (text.includes('下午') && text.includes('景点'))) {
                targetField = 'spot2';
                newValue = extractLocation(message) || extractNewValue(message, '下午');
            } else if (text.includes('晚餐') || text.includes('晚上')) {
                targetField = 'dinner';
                newValue = extractLocation(message) || extractNewValue(message, '晚餐');
            }

            if (targetField && newValue) {
                // 更新数据
                chatData.plan[targetField] = newValue;

                // 确认修改
                const fieldNames = {
                    spot1: '早上景点',
                    lunch: '午餐',
                    spot2: '下午景点',
                    dinner: '晚餐'
                };

                studentSay(`好的，已经把${fieldNames[targetField]}修改为 **${newValue}** 了！还有其他要调整的吗？`,
                    [
                        { text: '✅ 调整完毕，生成文档', action: completeChat },
                        { text: '✏️ 还要调整', action: () => studentSay('好的，请告诉我还有哪里需要修改～') }
                    ]
                );
            } else {
                // 无法识别修改内容，询问更具体的信息
                studentSay('好的，请问您想修改哪个部分呢？可以说"修改午餐为XXX"或"把早上景点改成XXX"～');
            }
        }

        // 从消息中提取新值（当关键词后面跟着"为"或"改成"时）
        function extractNewValue(message, defaultContext) {
            // 尝试匹配 "XXX为YYY" 或 "XXX改成YYY" 的模式
            const patterns = [
                /为(.+)/,
                /改成(.+)/,
                /改为(.+)/,
                /修改为(.+)/,
                /修改成(.+)/
            ];

            for (const pattern of patterns) {
                const match = message.match(pattern);
                if (match && match[1]) {
                    return extractLocation(match[1]);
                }
            }

            // 如果没有匹配到模式，尝试直接提取地点
            return extractLocation(message);
        }

        // 从存储的内容中提取纯地点名称（用于总结显示）
        function extractPureLocation(content) {
            if (!content) return '';

            // 查找常见的苏州景点/餐厅关键词
            const suzhouLocations = [
                '拙政园', '狮子林', '留园', '虎丘', '平江路', '山塘街',
                '观前街', '金鸡湖', '苏州博物馆', '网师园', '怡园',
                '松鹤楼', '得月楼', '水云台', '朱鸿兴', '绿杨馄饨',
                '哑巴生煎', '鑫震源', '陆稿荐', '杜三珍'
            ];

            // 检查内容中是否包含已知地点
            for (const loc of suzhouLocations) {
                if (content.includes(loc)) {
                    return loc;
                }
            }

            // 使用地点提取逻辑
            const extracted = extractLocation(content);
            return extracted;
        }

        // 提取纯地点（用于最终总结）
        function getPureSpotName(spot) {
            return extractPureLocation(spot);
        }

        // 处理基础信息修改
        function handleBasicInfoModification(message) {
            const text = message.trim().toLowerCase();

            // 识别要修改的内容
            if (text.includes('姓名') || text.includes('名字')) {
                // 提取新名字
                const newName = message.replace(/[^\\u4e00-\\u9fa5a-zA-Z]/g, '').trim();
                if (newName.length >= 2) {
                    chatData.basicInfo.name = newName;
                    const title = chatData.basicInfo.gender === '男' ? '爷爷' : '奶奶';
                    studentSay(`好的，已经把姓名修改为 **${newName}** 了！还有其他要修改的吗？`,
                        [
                            { text: '✅ 信息正确，继续', action: proceedToSpot1 },
                            { text: '✏️ 还有修改', action: () => studentSay('好的，请告诉我还有哪里需要修改～') }
                        ]
                    );
                    return;
                }
            } else if (text.includes('年龄') || text.includes('年纪')) {
                const ageMatch = message.match(/\\d+/);
                if (ageMatch) {
                    const newAge = parseInt(ageMatch[0]);
                    if (newAge >= 40 && newAge <= 120) {
                        chatData.basicInfo.age = newAge;
                        studentSay(`好的，已经把年龄修改为 **${newAge}岁** 了！还有其他要修改的吗？`,
                            [
                                { text: '✅ 信息正确，继续', action: proceedToSpot1 },
                                { text: '✏️ 还有修改', action: () => studentSay('好的，请告诉我还有哪里需要修改～') }
                            ]
                        );
                        return;
                    }
                }
            }

            // 无法识别修改内容
            studentSay('好的，请告诉我哪里需要修改～比如"修改姓名为XXX"或"把年龄改成XX岁"～');
        }

        // 处理补充内容的函数
        function handleSupplement(message) {
            const supplement = message.trim();
            if (!supplement) {
                studentSay('您好像没有输入什么内容呢～请再说一次好吗？');
                return;
            }

            // 提取补充内容中的关键信息
            const extractedInfo = analyzeIntent(supplement, 'location');

            // 根据当前补充的类型，将内容追加到对应的 plan 字段
            switch (pendingConfirmState) {
                case 'spot1':
                    chatData.plan.spot1 += ' ' + extractedInfo;
                    studentSay(`哇，这个信息太有用了！我记下来了～\n\n您还有其他想补充的吗？比如怎么逛比较有意思，或者有什么拍照好看的地方～`,
                        [
                            { text: '✅ 补充得差不多了，继续', action: () => {
                                pendingConfirmState = null;
                                proceedToLunch();
                            }},
                            { text: '💬 还想再说说', action: () => {
                                studentSay('好的好的，慢慢说～我听着呢！');
                            }}
                        ]
                    );
                    break;
                case 'lunch':
                    chatData.plan.lunch += ' ' + extractedInfo;
                    studentSay(`原来是这样呀，这家店听起来真不错！\n\n您还知道什么好吃的吗？或者有什么必点的招牌菜？`,
                        [
                            { text: '✅ 差不多了，继续下一个', action: () => {
                                pendingConfirmState = null;
                                proceedToSpot2();
                            }},
                            { text: '💬 还想说说', action: () => {
                                studentSay('好嘞，继续说～');
                            }}
                        ]
                    );
                    break;
                case 'spot2':
                    chatData.plan.spot2 += ' ' + extractedInfo;
                    studentSay(`哇，听起来很有意思！您对苏州真是了如指掌呀～\n\n还有什么要提醒我们的吗？`,
                        [
                            { text: '✅ 没问题了，继续', action: () => {
                                pendingConfirmState = null;
                                proceedToDinner();
                            }},
                            { text: '💬 还想说说', action: () => {
                                studentSay('好的好的，继续～');
                            }}
                        ]
                    );
                    break;
                case 'dinner':
                    chatData.plan.dinner += ' ' + extractedInfo;
                    studentSay(`太好了！听您这么一说，我都想去了～\n\n还有其他要补充的吗？`,
                        [
                            { text: '✅ 补充完了，进入下一步', action: () => {
                                pendingConfirmState = null;
                                finalConfirm();
                            }},
                            { text: '💬 还想说说', action: () => {
                                studentSay('好的好的，继续～');
                            }}
                        ]
                    );
                    break;
                default:
                    pendingConfirmState = null;
                    studentSay('抱歉，我好像跟不上您的节奏了～让我们重新开始吧！');
            }
        }

        // ==================== Document Generation ====================
        function generateDocument() {
            const { basicInfo, plan, chatHistory, createdAt } = chatData;
            const title = basicInfo.gender === '男' ? '爷爷' : '奶奶';
            const date = new Date(createdAt).toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });

            let html = `
                <div class="doc-section">
                    <h3>一、基本信息</h3>
                    <table class="doc-table">
                        <tr><th width="35%">项目</th><th>内容</th></tr>
                        <tr><td>称呼</td><td>${basicInfo.name}${title}</td></tr>
                        <tr><td>性别</td><td>${basicInfo.gender === '男' ? '男' : '女'}</td></tr>
                        <tr><td>年龄</td><td>${basicInfo.age}岁</td></tr>
                        <tr><td>苏州居住年限</td><td>${basicInfo.suzhouYears}年</td></tr>
                        <tr><td>记录日期</td><td>${date}</td></tr>
                    </table>
                </div>

                <div class="doc-section">
                    <h3>二、苏州一日游计划</h3>
                    <div class="doc-plan">
                        <div class="doc-plan-item">
                            <div class="label">🌅 早上</div>
                            <div class="value">${getPureSpotName(plan.spot1)}</div>
                            ${plan.spot1 !== getPureSpotName(plan.spot1) ? `<div class="detail">详细：${escapeHtml(plan.spot1)}</div>` : ''}
                        </div>
                        <div class="doc-plan-item">
                            <div class="label">🍜 午餐</div>
                            <div class="value">${getPureSpotName(plan.lunch)}</div>
                            ${plan.lunch !== getPureSpotName(plan.lunch) ? `<div class="detail">详细：${escapeHtml(plan.lunch)}</div>` : ''}
                        </div>
                        <div class="doc-plan-item">
                            <div class="label">🏛️ 下午</div>
                            <div class="value">${getPureSpotName(plan.spot2)}</div>
                            ${plan.spot2 !== getPureSpotName(plan.spot2) ? `<div class="detail">详细：${escapeHtml(plan.spot2)}</div>` : ''}
                        </div>
                        <div class="doc-plan-item">
                            <div class="label">🌙 晚餐</div>
                            <div class="value">${getPureSpotName(plan.dinner)}</div>
                            ${plan.dinner !== getPureSpotName(plan.dinner) ? `<div class="detail">详细：${escapeHtml(plan.dinner)}</div>` : ''}
                        </div>
                    </div>
                </div>

                <div class="doc-section">
                    <h3>三、对话记录</h3>
                    <div class="doc-chat">
            `;

            chatHistory.forEach(item => {
                const speakerLabel = item.speaker === 'student' ? '🎓 学生' : '👤 长者';
                html += `
                    <div class="doc-chat-item ${item.speaker}">
                        <div class="doc-chat-meta">${item.timestamp} · ${speakerLabel}</div>
                        <div>${escapeHtml(item.content)}</div>
                    </div>
                `;
            });

            html += `
                    </div>
                </div>
            `;

            return html;
        }

        function showDocModal() {
            const docContent = document.getElementById('docContent');
            docContent.innerHTML = generateDocument();
            document.getElementById('docModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('docModal').classList.remove('active');
        }

        function copyDoc() {
            const docContent = document.getElementById('docContent');
            const text = docContent.innerText;

            navigator.clipboard.writeText(text).then(() => {
                showToast('内容已复制到剪贴板！');
            }).catch(() => {
                showToast('复制失败，请手动复制～');
            });
        }

        function downloadDoc() {
            const { basicInfo, plan, chatHistory, createdAt } = chatData;
            const title = basicInfo.gender === '男' ? '爷爷' : '奶奶';
            const date = new Date(createdAt).toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });

            let text = `
═══════════════════════════════════════════════════════
            苏州一日游计划 · 对话记录文档
═══════════════════════════════════════════════════════

一、基本信息
───────────────────────────────────────
  称呼：${basicInfo.name}${title}
  性别：${basicInfo.gender === '男' ? '男' : '女'}
  年龄：${basicInfo.age}岁
  苏州居住年限：${basicInfo.suzhouYears}年
  记录日期：${date}

二、苏州一日游计划
───────────────────────────────────────
  🌅 早上：${plan.spot1}
  🍜 午餐：${plan.lunch}
  🏛️ 下午：${plan.spot2}
  🌙 晚餐：${plan.dinner}

三、对话记录
───────────────────────────────────────
`;

            chatHistory.forEach(item => {
                const speakerLabel = item.speaker === 'student' ? '【学生】' : '【长者】';
                text += `\n${item.timestamp} ${speakerLabel}\n${item.content}\n`;
            });

            text += `\n═══════════════════════════════════════════════════════
                      文档生成时间：${new Date().toLocaleString('zh-CN')}
═══════════════════════════════════════════════════════
`;

            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `苏州一日游_${basicInfo.name}_${new Date().toISOString().split('T')[0]}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showToast('文档下载成功！');
        }

        function startNewChat() {
            if (chatData.chatHistory.length > 0) {
                if (!confirm('确定要开始新的对话吗？当前对话记录将被保存。')) {
                    return;
                }
            }

            // Reset state
            currentState = STATES.START;
            chatData = {
                basicInfo: { name: '', gender: '', age: null, suzhouYears: null },
                plan: { spot1: '', lunch: '', spot2: '', dinner: '' },
                chatHistory: [],
                createdAt: new Date().toISOString()
            };

            // Clear UI
            document.getElementById('chatContainer').innerHTML = `
                <div class="empty-state" id="emptyState">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <p>点击下方按钮开始收集苏州游玩建议</p>
                </div>
            `;

            updateProgress();
            showToast('已准备好，开始新对话吧～');
        }

        // ==================== Event Listeners ====================
        document.addEventListener('DOMContentLoaded', () => {
            // Update time
            updateTime();
            setInterval(updateTime, 1000);

            // Auto-resize textarea
            const input = document.getElementById('userInput');
            input.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });

            // Send on Enter (Shift+Enter for new line)
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // Click to start
            document.getElementById('sendBtn').addEventListener('click', () => {
                if (currentState === STATES.START) {
                    document.getElementById('emptyState').style.display = 'none';
                    startChat();
                } else {
                    sendMessage();
                }
            });

            // Start hint
            setTimeout(() => {
                const emptyState = document.getElementById('emptyState');
                if (emptyState) {
                    emptyState.innerHTML = `
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <p>点击下方按钮开始收集苏州游玩建议</p>
                        <button class="quick-btn" style="margin-top: 16px; background: var(--primary); color: white;" onclick="document.getElementById('sendBtn').click()">开始对话</button>
                    `;
                }
            }, 500);

            // Close modal on outside click
            document.getElementById('docModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeModal();
                }
            });
        });
    </script>

(function () {

  if (window.self === window.top) {

  if (window.__iframeHighlightInitialized) {

  // 创建悬停标签显示
  var tagLabel = document.createElement("div");

  overlay.appendChild(highlightBox);

  function updateSelectedHighlight(element) {

      return;

    selectedElement = element;

    selectedBox.style.display = "block";
    selectedBox.style.left = "".concat(rect.left - 2, "px");

    // 更新选中标签位置和内容

    // 计算标签位置，确保不超出视窗
    var labelTop = rect.top - 28;

    if (labelTop < 5) {

    // 如果标签会超出右侧，向左调整
    var labelWidth = selectedLabel.offsetWidth || 100; // 预估宽度
    if (labelLeft + labelWidth > window.innerWidth - 10) {
      labelLeft = window.innerWidth - labelWidth - 10;

    selectedLabel.style.left = "".concat(Math.max(5, labelLeft), "px");
    selectedLabel.style.top = "".concat(labelTop, "px");

        width: rect.width,
        height: rect.height,
        x: rect.x,
        y: rect.y
      },
      selector: selector,
      text: text,
      attributes: attributes,
      url: window.location.href,
      path: window.location.pathname,
      timestamp: Date.now()
    };
    try {
      window.parent.postMessage({
        type: "iframe-element-click",
        data: elementInfo,
        source: "iframe-highlight-injector"
      }, "*");
    } catch (error) {
      console.warn("无法发送消息到父窗口:", error);
    }
  }

  // 监听来自父窗口的消息
  function handleParentMessage(event) {
    console.log("Received message from parent:", event.data);
    if (event.data.type === "iframe-highlight-toggle") {
      var enabled = event.data.enabled;
      console.log("Highlight toggle:", enabled);
      if (enabled) {
        enableHighlight();
      } else {
        disableHighlight();
      }
    } else if (event.data.type === "enable-iframe-highlight") {
      console.log("Enable iframe highlight");
      enableHighlight();
    } else if (event.data.type === "disable-iframe-highlight") {
      console.log("Disable iframe highlight");
      disableHighlight();
    } else if (event.data.type === "toggle-iframe-highlight") {
      var _enabled = event.data.enabled !== undefined ? event.data.enabled : !highlightEnabled;
      console.log("Toggle iframe highlight to:", _enabled);
      if (_enabled) {
        enableHighlight();
      } else {
        disableHighlight();
      }
    } else if (event.data.type === "update-selected-element") {
      var selector = event.data.selector;
      console.log("Update selected element with selector:", selector);
      if (selector) {
        try {
          var element = document.querySelector(selector);
          console.log("Found element by selector:", element);
          updateSelectedHighlight(element);
        } catch (error) {
          console.warn("Failed to select element:", error);
          updateSelectedHighlight(null);
        }
      } else {
        updateSelectedHighlight(null);
      }
    } else if (event.data.type === "clear-selected-element") {
      console.log("Clear selected element");
      updateSelectedHighlight(null);
    }
  }

  // 启用高亮功能
  function enableHighlight() {
    console.log("Enabling highlight");
    document.addEventListener("mouseover", handleMouseOver, true);
    document.addEventListener("mouseout", handleMouseOut, true);
    document.addEventListener("click", handleClick, true);
    highlightEnabled = true;
    overlay.style.display = "block";
  }

  // 禁用高亮功能
  function disableHighlight() {
    console.log("Disabling highlight");
    highlightEnabled = false;
    // 保持事件监听器，但通过 highlightEnabled 变量控制行为
    // 这样可以保留选中状态的显示
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    // 不隐藏 selectedBox 和 selectedLabel，保留选中状态
  }

  // 完全禁用高亮功能（移除所有监听器）
  function fullyDisableHighlight() {
    console.log("Fully disabling highlight");
    highlightEnabled = false;
    document.removeEventListener("mouseover", handleMouseOver, true);
    document.removeEventListener("mouseout", handleMouseOut, true);
    document.removeEventListener("click", handleClick, true);
    overlay.style.display = "none";
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    selectedBox.style.display = "none";
    selectedLabel.style.display = "none";
  }

  // 添加事件监听
  enableHighlight();
  window.addEventListener("message", handleParentMessage);

  // 暴露全局函数供外部调用
  window.__iframeHighlightControl = {
    enable: enableHighlight,
    disable: disableHighlight,
    fullyDisable: fullyDisableHighlight,
    isEnabled: function isEnabled() {
      return highlightEnabled;
    },
    getSelectedElement: function getSelectedElement() {
      return selectedElement;
    },
    updateSelected: updateSelectedHighlight,
    // 通过消息发送开关控制
    sendToggleMessage: function sendToggleMessage(enabled) {
      window.parent.postMessage({
        type: 'iframe-highlight-status',
        enabled: enabled || highlightEnabled,
        source: 'iframe-highlight-injector'
      }, '*');
    }
  };

  // 通知父窗口脚本已加载
  try {
    window.parent.postMessage({
      type: "iframe-highlight-ready",
      data: {
        url: window.location.href,
        userAgent: navigator.userAgent,
        timestamp: Date.now()
      },
      source: "iframe-highlight-injector"
    }, "*");
  } catch (error) {
    console.warn("无法发送就绪消息到父窗口:", error);
  }

  // 清理函数
  window.__iframeHighlightCleanup = function () {
    fullyDisableHighlight();
    window.removeEventListener("message", handleParentMessage);
    if (overlay.parentElement) {
      overlay.parentElement.removeChild(overlay);
    }
    delete window.__iframeHighlightInitialized;
    delete window.__iframeHighlightCleanup;
  };
})();

</script>
</body>
</html>
